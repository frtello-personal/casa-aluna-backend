version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: casaaluna-postgres
    environment:
      POSTGRES_DB: casaaluna
      POSTGRES_USER: casaaluna
      POSTGRES_PASSWORD: casaaluna
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casaaluna"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - casaaluna-network

volumes:
  postgres_data:
    driver: local

networks:
  casaaluna-network:
    driver: bridge
